name: Get macOS Sequoia Screenshot
on: [push, workflow_dispatch]

jobs:
  take-screenshot:
    runs-on: macos-15
    steps:
      - name: Open About Settings
        run: |
          # فتح صفحة About في إعدادات النظام مباشرة
          open "x-apple.systempreferences:com.apple.About-Settings.extension"
          sleep 10
          
      - name: Capture Screen
        run: |
          # أخذ لقطة شاشة بدون صوت وحفظها
          screencapture -x screenshot.png

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-screenshot
          path: screenshot.png
