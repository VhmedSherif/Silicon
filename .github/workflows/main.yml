name: Get macOS Sequoia Screenshot
on: [push, workflow_dispatch]

jobs:
  take-screenshot:
    runs-on: macos-15
    steps:
      - name: Open About Settings and Click About
        run: |
          # 1. فتح إعدادات النظام على صفحة General
          open "x-apple.systempreferences:com.apple.About-Settings.extension"
          sleep 5
          
          # 2. تشغيل AppleScript ذكي يبحث عن زر "About" ويضغط عليه مهما كان مكانه
          osascript -e '
          tell application "System Settings" to activate
          delay 2
          tell application "System Events"
              tell process "System Settings"
                  try
                      -- البحث عن أول عنصر اسمه "About" جوة النافذة والضغط عليه
                      set aboutBtn to (first UI element of entire contents of window 1 whose name is "About")
                      click aboutBtn
                      delay 3
                  on error err
                      log "Error finding About button: " & err
                  end try
              end tell
          end tell
          '
          
      - name: Capture Screen
        run: |
          # 3. لقط الشاشة بدون صوت وحفظها
          screencapture -x screenshot.png

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-screenshot
          path: screenshot.png
