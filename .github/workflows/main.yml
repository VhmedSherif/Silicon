name: Get macOS Sequoia Screenshot (Direct Reveal)
on: [push, workflow_dispatch]

jobs:
  take-screenshot:
    runs-on: macos-15
    steps:
      - name: Reveal About Pane and Emulate Keys
        run: |
          # 1. أمر النظام بفتح صفحة About مباشرة بدون كليكات
          osascript -e '
          tell application "System Settings"
              activate
              delay 3
              reveal pane id "com.apple.About-Settings.extension"
          end tell
          '
          sleep 5

          # 2. خطوة احتياطية: كتابة About والضغط على Enter كأنك بتكتب بكيبورد حقيقي
          osascript -e '
          tell application "System Settings" to activate
          delay 2
          tell application "System Events"
              -- كتابة الكلمة في خانة البحث
              keystroke "About"
              delay 2
              -- الضغط على Enter لتحديد نتيجة البحث الأولى
              key code 36
              delay 2
              -- الضغط على Enter مرة أخرى لفتح الصفحة
              key code 36
          end tell
          '
          sleep 5
          
      - name: Capture Screen
        run: |
          # 3. لقط الشاشة وحفظها
          screencapture -x screenshot.png

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-screenshot
          path: screenshot.png
