name: Get macOS Sequoia Screenshot (Patient Mode)
on: [push, workflow_dispatch]

jobs:
  take-screenshot:
    runs-on: macos-15
    steps:
      - name: Open Settings and Wait Patiently
        run: |
          # 1. فتح إعدادات النظام مباشرة على صفحة General
          open "x-apple.systempreferences:com.apple.About-Settings.extension"
          
          # 2. الانتظار طويلاً (15 ثانية) لضمان تحميل الواجهة بالكامل
          # image_26.png أثبتت أن 5 ثواني غير كافية
          sleep 15
          
          # 3. استخدام AppleScript متقدم للضغط على "About"
          # الكود ده هيبحث في كل العناصر عن زر اسمه "About" ويضغط عليه
          osascript -e '
          tell application "System Settings" to activate
          delay 3
          tell application "System Events"
              tell process "System Settings"
                  try
                      -- البحث عن الزر والضغط عليه، مهما كان موقعه في Sequoia
                      click (first UI element of entire contents of window 1 whose name is "About")
                      delay 3
                  on error err
                      log "Error clicking About: " & err
                  end try
              end tell
          end tell
          '
          # وقت إضافي لتثبيت الواجهة الجديدة
          sleep 5
          
          # 4. أخذ لقطة الشاشة بدون صوت وحفظها
          screencapture -x screenshot.png

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-screenshot
          path: screenshot.png
