name: Connect to macOS VNC
on: [push, workflow_dispatch]

jobs:
  vnc-connect:
    runs-on: macos-15
    steps:
      - name: Enable macOS Screen Sharing (VNC)
        run: |
          # تفعيل مشاركة الشاشة وضبط كلمة مرور الـ VNC لتكون 123456
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -clientopts -setvnclegacy -vnclegacy yes -clientopts -setvncpw -vncpw 123456 -restart -agent -privs -all

      - name: Install and Configure Ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          brew install ngrok
          ngrok config add-authtoken $NGROK_AUTH_TOKEN

      - name: Start Ngrok Tunnel
        run: |
          # فتح نفق للبورت 5900 الخاص بالـ VNC
          ngrok tcp 5900 --log=stdout &
          sleep 10
          
          # استخراج رابط الاتصال من الـ API الخاص بـ Ngrok وطباعته
          echo "=========================================================="
          echo "Connect to this address using your VNC Viewer:"
          curl --silent http://127.0.0.1:4040/api/tunnels | grep -o 'tcp://[^"]*'
          echo "=========================================================="
          
          # إبقاء السيرفر شغال لمدة ساعة كاملة لتتحكم فيه براحتك
          sleep 3600
