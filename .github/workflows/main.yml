name: Get macOS Sequoia Screenshot
on: [push, workflow_dispatch]

jobs:
  take-screenshot:
    runs-on: macos-15
    steps:
      - name: Open About Page and Take Screenshot
        run: |
          # 1. فتح إعدادات النظام على صفحة General
          open "x-apple.systempreferences:com.apple.About-Settings.extension"
          sleep 5
          
          # 2. استخدام AppleScript للضغط على زر About لضمان فتح الصفحة المطلوبة
          osascript -e '
          tell application "System Settings" to activate
          delay 2
          tell application "System Events"
              tell process "System Settings"
                  try
                      -- محاولة الضغط على زر About
                      click UI element "About" of group 1 of scroll area 1 of group 1 of group 2 of splitted group 1 of window 1
                  on error
                      try
                          -- محاولة بديلة لو الهيكل مختلف
                          click button "About" of group 1 of scroll area 1 of group 1 of group 2 of splitted group 1 of window 1
                      end try
                  end try
              end tell
          end tell
          '
          sleep 3
          
          # 3. أخذ لقطة الشاشة وحفظها
          screencapture -x screenshot.png

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-screenshot
          path: screenshot.png
