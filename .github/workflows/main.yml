name: Capture macOS About Page

on:
  push:
  workflow_dispatch:

jobs:
  take-screenshot:
    runs-on: macos-15
    steps:
      - name: Install click and image tools
        run: |
          brew untap aws/tap || true
          HOMEBREW_NO_REQUIRE_TAP_TRUST=1 brew install cliclick
          python3 -m pip install --user pillow --break-system-packages || python3 -m pip install --user pillow

      - name: Set clean Mac name
        run: |
          sudo scutil --set ComputerName "Ahmed's Mac"
          sudo scutil --set HostName "Ahmeds-Mac"
          sudo scutil --set LocalHostName "Ahmeds-Mac"
          dscacheutil -flushcache

      - name: Open About pane and click About row
        run: |
          set -euxo pipefail

          mkdir -p artifacts
          open "x-apple.systempreferences:com.apple.About-Settings.extension"
          sleep 10

          cliclick m:500,300
          sleep 1
          cliclick c:500,300
          sleep 8

          screencapture -x artifacts/screenshot.png
          sips -g pixelWidth -g pixelHeight artifacts/screenshot.png | tee artifacts/screenshot-size.txt

      - name: Patch screenshot with Pillow
        run: |
          set -euxo pipefail
          python3 <<'PY'
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont

          image_path = Path("artifacts/screenshot.png")
          img = Image.open(image_path).convert("RGBA")
          draw = ImageDraw.Draw(img)
          scale_x = img.width / 1024.0
          scale_y = img.height / 768.0

          def scaled_box(box):
              return tuple(int(v * (scale_x if i % 2 == 0 else scale_y)) for i, v in enumerate(box))

          def scaled_point(point):
              return (int(point[0] * scale_x), int(point[1] * scale_y))

          def font(candidates, size):
              for candidate in candidates:
                  path = Path(candidate)
                  if path.exists():
                      return ImageFont.truetype(str(path), int(size * scale_y))
              return ImageFont.load_default()

          regular = font([
              "/System/Library/Fonts/Supplemental/Arial.ttf",
              "/Library/Fonts/Arial.ttf",
          ], 14)
          bold = font([
              "/System/Library/Fonts/Supplemental/Arial Bold.ttf",
              "/Library/Fonts/Arial Bold.ttf",
              "/System/Library/Fonts/Supplemental/Arial.ttf",
          ], 29)

          page_bg = (246, 246, 246, 255)
          row_bg = (242, 242, 242, 255)
          dark = (29, 29, 31, 255)
          value = (100, 100, 100, 255)

          def erase(box, fill):
              draw.rectangle(scaled_box(box), fill=fill)

          def text_size(text, used_font):
              box = draw.textbbox((0, 0), text, font=used_font)
              return box[2] - box[0], box[3] - box[1]

          def centered_text(box, text, used_font, fill):
              box = scaled_box(box)
              width, height = text_size(text, used_font)
              x = box[0] + ((box[2] - box[0]) - width) / 2
              y = box[1] + ((box[3] - box[1]) - height) / 2 - 1
              draw.text((x, y), text, font=used_font, fill=fill)

          def right_text(box, text, used_font, fill):
              box = scaled_box(box)
              width, height = text_size(text, used_font)
              x = box[2] - width
              y = box[1] + ((box[3] - box[1]) - height) / 2
              draw.text((x, y), text, font=used_font, fill=fill)

          # Coordinates are based on the verified 1024x768 macos-15 About screenshot.
          erase((450, 244, 790, 284), page_bg)
          centered_text((450, 244, 790, 284), "Mac mini", bold, dark)

          erase((398, 304, 842, 326), row_bg)
          draw.text(scaled_point((400, 308)), "Name", font=regular, fill=dark)
          draw.text(scaled_point((434, 308)), "Ahmed's Mac", font=regular, fill=value)

          erase((700, 341, 842, 363), row_bg)
          right_text((700, 341, 839, 363), "Apple M1", regular, value)

          erase((760, 378, 842, 399), row_bg)
          right_text((760, 378, 839, 399), "16 GB", regular, value)

          erase((436, 625, 665, 646), row_bg)
          draw.text(scaled_point((442, 628)), "LG UltraFine 4K", font=regular, fill=dark)

          erase((690, 625, 842, 646), row_bg)
          right_text((690, 625, 839, 646), "27-inch (3840 x 2160)", regular, value)

          img.save(image_path)
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-about-capture
          path: artifacts/
